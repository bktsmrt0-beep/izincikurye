<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Paneli — izincikurye</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ff7a00'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' font-family='Arial,sans-serif' font-size='34' font-weight='700' fill='white'%3EiK%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css?v=80" />
  <link rel="stylesheet" href="admin.css?v=80" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <span class="logo-mark">iK</span>
        <span class="logo-text">izinci<span>kurye</span> · Admin</span>
      </a>
      <nav class="top-nav">
        <a href="/" class="btn btn-ghost btn-sm">← Anasayfa</a>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Çıkış</button>
      </nav>
    </div>
  </header>

  <div class="container admin-wrap">
    <div id="loading" class="muted">Yükleniyor...</div>
    <div id="forbidden" class="hidden notice" style="background:#fee2e2;border-color:#fecaca;color:#991b1b;">
      🚫 Bu sayfaya erişim için admin yetkin yok.
      <a href="/">Anasayfaya dön</a>
    </div>

    <div id="adminContent" class="hidden">
      <div class="stats">
        <div class="stat"><span class="stat-num" id="statIlan">0</span><span class="stat-lbl">Toplam ilan</span></div>
        <div class="stat"><span class="stat-num" id="statKul">0</span><span class="stat-lbl">Toplam üye</span></div>
        <div class="stat"><span class="stat-num" id="statAdmin">0</span><span class="stat-lbl">Admin</span></div>
      </div>

      <section class="admin-section">
        <h2>📋 Tüm İlanlar</h2>
        <div class="table-wrap">
          <table class="admin-table" id="ilanlarTable">
            <thead>
              <tr>
                <th>Tarih</th>
                <th>Başlık</th>
                <th>İlçe</th>
                <th>Saat</th>
                <th>Ücret</th>
                <th>İşyeri</th>
                <th>Sahibi</th>
                <th>İşlem</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="admin-section">
        <h2>👥 Kullanıcılar</h2>
        <div class="table-wrap">
          <table class="admin-table" id="usersTable">
            <thead>
              <tr>
                <th>Ad Soyad</th>
                <th>Telefon</th>
                <th>Kayıt Tarihi</th>
                <th>Rol</th>
                <th>İşlem</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
  <script src="supabase-config.js?v=41"></script>
  <script src="admin.js?v=41"></script>
</body>
</html>
